<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
	<defs>
		<style>
			.bg { fill: #f8fafc; }
			.sheet { fill: #ffffff; stroke: #d9e2ef; stroke-width: 2; rx: 22; }
			.panel { fill: #ffffff; stroke: #cfd8e6; stroke-width: 1.8; rx: 16; }
			.buffer { fill: #f4f6ff; stroke: #6258ff; stroke-width: 2.2; rx: 14; }
			.command { fill: #eef3ff; stroke: #6258ff; stroke-width: 1.8; rx: 10; }
			.command-active { fill: #dfe7ff; stroke: #5147f5; stroke-width: 4; rx: 10; }
			.layout { fill: #ffffff; stroke: #6258ff; stroke-width: 2.6; rx: 14; }
			.header-left { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 8; }
			.header-right { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; rx: 8; }
			.payload { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 8; }
			.restable { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2.2; rx: 14; }
			.title { font: 800 30px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
			.big { font: 800 27px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #1f2937; }
			.big-blue { font: 800 27px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #5147f5; }
			.big-cyan { font: 800 27px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #0891b2; }
			.label { font: 800 18px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #1f2937; }
			.label-blue { font: 800 18px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #5147f5; }
			.text { font: 500 19px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #667085; }
			.small { font: 500 15px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #8a94a6; }
			.tiny { font: 500 13px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #98a2b3; }
			.green { font: 500 16px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #047857; }
			.orange { font: 800 19px 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #e65100; }
			.line { stroke: #374151; stroke-width: 4; fill: none; }
			.line-orange { stroke: #e65100; stroke-width: 5; fill: none; }
			.line-dash { stroke: #98a2b3; stroke-width: 2.2; fill: none; stroke-dasharray: 7 7; }
			.line-blue { stroke: #6258ff; stroke-width: 3; fill: none; }
		</style>
		<marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
			<path d="M 0 0 L 14 7 L 0 14 z" fill="#374151"/>
		</marker>
		<marker id="arrowOrange" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto">
			<path d="M 0 0 L 16 8 L 0 16 z" fill="#e65100"/>
		</marker>
		<marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
			<path d="M 0 0 L 14 7 L 0 14 z" fill="#6258ff"/>
		</marker>
	</defs>

	<rect class="bg" width="1600" height="760"/>
	<rect class="sheet" x="2" y="2" width="1596" height="756"/>

	<text class="title" x="42" y="52">CyphenEngine 렌더 루프 — Buffer(스트림) → CommandIR 바이트 레이아웃(확대)</text>

	<!-- Engine -->
	<rect class="panel" x="42" y="150" width="268" height="492"/>
	<text class="big-blue" x="134" y="196">Engine</text>
	<text class="text" x="122" y="242">Frame 생산</text>
	<path class="line" marker-end="url(#arrow)" d="M 156 344 C 112 372 120 426 160 446"/>
	<text class="text" x="128" y="444">프레임 루프</text>
	<text class="text" x="82" y="588">완료 신호 → 다음 Frame</text>

	<!-- Renderer -->
	<rect class="panel" x="380" y="116" width="570" height="544"/>
	<text class="big" x="610" y="154">Renderer</text>

	<rect class="buffer" x="412" y="170" width="508" height="144"/>
	<text class="label-blue" x="514" y="200">Command Buffer (CommandList)</text>
	<text class="small" x="556" y="224">words* · wordCount · commandCount</text>

	<rect class="command" x="434" y="232" width="108" height="72"/>
	<text class="label-blue" x="466" y="272">Clear</text>
	<rect class="command-active" x="556" y="232" width="108" height="72"/>
	<text class="label-blue" x="592" y="272">Draw</text>
	<rect class="command" x="676" y="232" width="108" height="72"/>
	<text class="label-blue" x="712" y="272">Draw</text>
	<rect class="command" x="798" y="232" width="108" height="72"/>
	<text class="label-blue" x="828" y="272">Present</text>

	<text class="small" x="640" y="356">command 하나 확대</text>
	<path class="line-dash" d="M 610 304 L 448 398"/>
	<path class="line-dash" d="M 610 304 L 892 398"/>

	<rect class="layout" x="412" y="400" width="508" height="238"/>
	<text class="label-blue" x="516" y="428">CommandIR 바이트 레이아웃 (Draw)</text>

	<text class="tiny" x="448" y="458">0바이트</text>
	<text class="tiny" x="654" y="458">4바이트</text>
	<line class="line-dash" x1="550" y1="462" x2="550" y2="474"/>
	<line class="line-dash" x1="758" y1="462" x2="758" y2="474"/>
	<line class="line-dash" x1="862" y1="462" x2="862" y2="474"/>

	<text class="small" x="428" y="506">0</text>
	<rect class="header-left" x="448" y="474" width="206" height="50"/>
	<text class="label-blue" x="496" y="505">commandType=3</text>
	<rect class="header-right" x="656" y="474" width="206" height="50"/>
	<text class="label" x="704" y="505">payloadWordCount=1</text>

	<text class="small" x="428" y="568">8</text>
	<rect class="payload" x="448" y="534" width="414" height="50"/>
	<text class="green" x="538" y="565">payload — textureId (ResourceId)</text>

	<text class="small" x="518" y="622">1 command = header 1 word + payload 1 word</text>

	<!-- Backend -->
	<rect class="panel" x="1020" y="122" width="526" height="258"/>
	<text class="big-blue" x="1192" y="160">Backend (Dx11)</text>
	<text class="text" x="1216" y="200">IR → D3D11 API</text>

	<rect class="restable" x="1052" y="224" width="462" height="128"/>
	<text class="label" x="1152" y="260">ResTable · GPU 텍스처 테이블</text>
	<text class="green" x="1178" y="298">textureId(ResourceId)로 search</text>
	<text class="green" x="1202" y="326">→ 텍스처 get → 그리기</text>

	<rect class="panel" x="1020" y="444" width="526" height="198"/>
	<text class="big-cyan" x="1212" y="516">View / 화면</text>
	<text class="text" x="1230" y="560">present 출력</text>
	<text class="text" x="1198" y="592">두 장 교차 렌더</text>

	<!-- Arrows -->
	<path class="line" marker-end="url(#arrow)" d="M 310 228 L 380 228"/>
	<text class="label" x="308" y="210">① Frame</text>

	<path class="line" marker-end="url(#arrow)" d="M 920 240 L 1020 240"/>
	<text class="label" x="952" y="222">② buffer</text>

	<path class="line" marker-end="url(#arrow)" d="M 1283 352 L 1283 444"/>
	<text class="label" x="1306" y="418">④ present</text>

	<path class="line-orange" marker-end="url(#arrowOrange)" d="M 1283 642 L 1283 712 L 176 712 L 176 642"/>
	<text class="orange" x="482" y="700">⑤ present 완료 → 다음 프레임 신호 · tick-lock (1-slot)</text>
</svg>
